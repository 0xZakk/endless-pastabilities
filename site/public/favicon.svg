    L 7,12  L 12,18  L 17,12  L 22,18
    C 25,14  28,20  30,27
    L 32,28
    L 34,27
    C 36,20  39,14  42,18
    L 47,12  L 52,18  L 57,12  L 62,18
    L 62,46
    L 57,52  L 52,46  L 47,52  L 42,46
    C 39,50  36,44  34,37
    L 32,36
    L 30,37
    C 28,44  25,50  22,46
    L 17,52  L 12,46  L 7,52  L 2,46
    Z
  " />
  <style>
    path { fill: #1a1a1a; }
    @media (prefers-color-scheme: dark) {
      path { fill: #ffffff; }
    }
  </style>
</svg>
